name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # Cancel superseded runs on the same ref (e.g. rapid PR pushes).
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          # Pin to the uv the project is verified against (the real-uv contract tests
          # in tests/test_real_uv.py assume this CLI). Bump deliberately, not silently.
          version: "0.11.31"
          enable-cache: true

      - name: Install Python
        run: uv python install 3.14

      - name: Install dependencies
        # --locked: assert uv.lock is in sync with pyproject.toml and fail if not
        # (a PR that edits pyproject without re-locking is rejected). Note: --frozen
        # would NOT catch this — it just installs the existing lock as-is.
        run: uv sync --locked

      - name: Lint & format (ruff)
        # Tools are pinned in the `lint` dependency group; run them from the synced
        # env so versions can't drift under CI.
        run: |
          uv run --no-sync ruff check src tests
          uv run --no-sync ruff format --check src tests

      - name: Static checks (vulture, slotscheck)
        run: |
          uv run --no-sync vulture
          uv run --no-sync slotscheck -m lazyuv

      - name: Config & spelling (typos, taplo, validate-pyproject, actionlint)
        # The 4 strict type-checkers (mypy/pyright/ty/pyrefly) are configured but not
        # yet gated — being ratcheted in incrementally.
        run: |
          uv run --no-sync typos
          uv run --no-sync taplo lint
          uv run --no-sync taplo format --check
          uv run --no-sync validate-pyproject pyproject.toml
          uv run --no-sync actionlint

      - name: Test
        # The env is already synced above; uv is on PATH, so the real-uv contract
        # tests run (not skipped).
        run: uv run --no-sync pytest -q
