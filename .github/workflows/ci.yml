name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # Cancel superseded runs on the same ref (e.g. rapid PR pushes).
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          # Pin to the uv the project is verified against (the real-uv contract tests
          # in tests/test_real_uv.py assume this CLI). Bump deliberately, not silently.
          version: "0.11.31"
          enable-cache: true

      - name: Install Python
        run: uv python install 3.14

      - name: Install dependencies
        # --frozen: install exactly from uv.lock and fail if it's out of date.
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uvx ruff check src tests

      - name: Test
        # uv is on PATH here, so the real-uv contract tests run (not skipped).
        run: uv run --frozen pytest -q
