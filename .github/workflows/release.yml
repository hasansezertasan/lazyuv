---
name: Release
on:
  workflow_dispatch:
  push:
    branches: [main]
permissions: {}
jobs:
  release-please:
    runs-on: ubuntu-latest
    name: Release Please
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      # Prerelease detection. release-please tags prereleases in SemVer form --
      # `v0.2.0-beta.1` -- which hatch-vcs normalizes to the PEP 440 `0.2.0b1`. A
      # final tag (`v0.2.0`) never contains a hyphen, so a `-` in the tag is an
      # unambiguous prerelease marker. publish-release gates on this: prereleases
      # ship to PyPI (hidden without `--pre`) and the GitHub release, but are kept
      # off "Latest release". The beta channel isn't enabled in the config today,
      # so this gate is inert -- but binding the moment it is turned on.
      is_prerelease: ${{ contains(steps.release.outputs.tag_name, '-') }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
  build-package:
    # Pure producer, fed by the drafted release+tag: contents:read only, it never
    # touches the release. It uploads a workflow artifact that publish-release
    # attaches. The release is ATOMIC -- publish-pypi needs this build, so nothing
    # ships unless the artifact built.
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    name: Build sdist + wheel
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          # hatch-vcs derives the version from the git tag, so the build needs full
          # history and tags. fetch-depth: 0 fetches everything, including the
          # release tag, which `force-tag-creation` in the release-please config
          # makes release-please create immediately -- GitHub otherwise withholds
          # the tag for a draft release until it is published.
          fetch-depth: 0
      - name: Setup uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Install Python
        run: uv python install 3.14
      - name: Build the package
        run: uv build --no-sources
      - name: Upload the distribution
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist-pypi
          path: dist/
  publish-pypi:
    # Atomic gate: requires the build. A failed build blocks the PyPI release too.
    needs: [release-please, build-package]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    name: Publish to PyPI
    permissions:
      id-token: write  # IMPORTANT: Mandatory for PyPI Trusted Publishing (OIDC)
    environment:
      name: publish
      url: https://pypi.org/project/lazyuv/${{ needs.release-please.outputs.version }}
    steps:
      - name: Setup uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
      - name: Download the distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist-pypi
          path: dist
      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
  publish-release:
    # Runs only after PyPI succeeds (which in turn required the build). Attaches
    # the distribution to the release and un-drafts it.
    needs: [release-please, publish-pypi]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    name: Publish GitHub release
    permissions:
      contents: write  # IMPORTANT: Mandatory to upload assets and un-draft the release
    steps:
      - name: Download the release-asset artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts
          pattern: dist-*
      - name: Attach artifacts and publish the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # This job has no checkout, so gh has no git remote to infer the repo from.
          # gh reads --repo / GH_REPO (NOT GITHUB_REPOSITORY), so set it explicitly.
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          IS_PRERELEASE: ${{ needs.release-please.outputs.is_prerelease }}
        run: |
          mapfile -t files < <(find artifacts -type f)
          # Defensive: the build gates this job, so files should always exist -- but
          # fail loudly rather than un-draft an empty release.
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::no artifacts found to attach to the release"; exit 1
          fi
          gh release upload "$TAG" "${files[@]}" --clobber
          # Un-draft and set the prerelease/latest flags explicitly. A beta is marked
          # --prerelease and kept off "Latest release"; a graduated stable forces the
          # inverse (release-please flags drafts per the config, so clear it here).
          if [ "$IS_PRERELEASE" = "true" ]; then
            gh release edit "$TAG" --draft=false --prerelease --latest=false
          else
            gh release edit "$TAG" --draft=false --prerelease=false --latest
          fi
  reconcile:
    # release-please derives its commit range from the latest *published* GitHub
    # Release and ignores drafts. The release-please job above opened the next
    # release PR in this same run while this release was still a draft, so that PR
    # was computed with no baseline and re-lists every already-shipped commit as a
    # phantom bump. release-please won't clean that up on its own. So close it here
    # now that the release is published, then re-dispatch: the re-run sees the
    # published release and recreates a CORRECT next PR only if real unreleased
    # commits exist; otherwise it stops without reaching this job again, so the
    # re-trigger is bounded to one run. (workflow_dispatch is the documented
    # exception to GITHUB_TOKEN loop-prevention, so no PAT is required.)
    needs: [release-please, publish-release]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    name: Reconcile next release PR
    permissions:
      contents: write  # IMPORTANT: for `gh pr close --delete-branch` (deletes the ref)
      pull-requests: write  # IMPORTANT: to close the phantom release PR
      actions: write  # IMPORTANT: to re-dispatch this workflow
    steps:
      - name: Close the phantom PR and re-dispatch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          pr="$(gh pr list --state open \
            --head "release-please--branches--${REF_NAME}" \
            --json number --jq '.[0].number // empty')"
          if [ -n "$pr" ]; then
            echo "Closing phantom release PR #$pr"
            gh pr close "$pr" --delete-branch
          fi
          gh workflow run "${{ github.workflow }}" --ref "$REF_NAME"
